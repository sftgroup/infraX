<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfraX — Connect Wallet</title>
<style>
:root {
  --dark-950: #0B0E11; --dark-800: #0B0E11;
  --dark-700: #2B3139; --dark-400: #848E9C; --dark-300: #5E6673;
  --brand: #FCD535; --brand-hover: #F0B90B;
  --success: #0ECB81; --error: #F6465D;
  --surface-card: #1E2329; --border: #2B3139;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--dark-950); color: #EAECEF;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.card {
  background: var(--surface-card);
  border: 1px solid var(--border);
  border-radius: 6px; padding: 32px; width: 100%; max-width: 400px;
  text-align: center;
}
h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
.sub { font-size: 13px; color: var(--dark-400); margin-bottom: 24px; line-height: 1.5; }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 24px; border-radius: 4px; font-size: 14px; font-weight: 600;
  cursor: pointer; border: none; transition: all 0.15s;
  width: 100%; justify-content: center; line-height: 1;
}
.btn-primary { background: var(--brand); color: #181A20; }
.btn-primary:hover { background: var(--brand-hover); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.error { color: var(--error); font-size: 12px; margin-top: 12px; }
.glow {
  position: absolute; width: 200px; height: 200px;
  border-radius: 50%; filter: blur(100px); opacity: 0.04; pointer-events: none;
}
.glow-left { background: var(--brand); left: -100px; top: -50px; }
.glow-right { background: var(--brand); right: -100px; bottom: -50px; }
.logo { font-size: 40px; margin-bottom: 12px; display: block; }
</style>
</head>
<body>
<div class="glow glow-left"></div>
<div class="glow glow-right"></div>

<div class="card">
  <span class="logo">🪙</span>
  <h1>InfraX</h1>
  <p class="sub">Connect your wallet to access all features</p>

  <button class="btn btn-primary" id="connect-btn" onclick="connectWallet()">
    <span style="font-size:16px">🦊</span> Connect MetaMask
  </button>

  <div class="error" id="error"></div>

  <p style="font-size:11px;color:var(--dark-400);margin-top:20px">
    No wallet? Get <a href="https://metamask.io" target="_blank" style="color:var(--brand)">MetaMask</a>
  </p>
</div>

<script>
var API = location.protocol + '//' + location.host;

function showError(msg) {
  document.getElementById('error').textContent = msg;
}

async function connectWallet() {
  document.getElementById('error').textContent = '';
  var btn = document.getElementById('connect-btn');
  btn.disabled = true;
  btn.textContent = 'Connecting...';

  try {
    if (typeof window.ethereum === 'undefined') {
      throw new Error('No wallet detected. Please install MetaMask or use a Web3 browser.');
    }

    var accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    var address = accounts[0].toLowerCase();

    var ts = Date.now().toString();
    var sig = await window.ethereum.request({
      method: 'personal_sign',
      params: ['InfraX auth: ' + ts, address]
    });

    var r = await fetch(API + '/api/v2/wallet/balance', {
      headers: {
        'x-wallet-address': address,
        'x-wallet-signature': sig,
        'x-wallet-timestamp': ts
      }
    });

    if (!r.ok && r.status !== 401) {
      var j = await r.json().catch(() => ({}));
      if (j.code && j.code > 0) throw new Error(j.message || 'Connection failed');
    }

    localStorage.setItem('px_sig', sig);
    localStorage.setItem('px_ts', ts);
    localStorage.setItem('px_sig_addr', address);
    localStorage.setItem('px_user', JSON.stringify({
      walletAddress: address,
      connectedAt: Date.now()
    }));

    window.location.href = '/index.html';

  } catch (e) {
    showError(e.message || 'Connection failed. Please try again.');
    btn.disabled = false;
    btn.innerHTML = '<span style="font-size:16px">🦊</span> Connect MetaMask';
  }
}

(function() {
  try {
    var u = JSON.parse(localStorage.getItem('px_user') || '{}');
    if (u.walletAddress) {
      if (window.ethereum && window.ethereum.selectedAddress) {
        window.location.href = '/index.html';
      }
    }
  } catch(e) {}
})();
</script>
</body>
</html>

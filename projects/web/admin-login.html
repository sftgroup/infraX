<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfraX Admin — Sign In</title>
<style>
:root {
  --brand: #FCD535; --brand-hover: #F0B90B;
  --surface-bg: #0B0E11; --surface-card: #1E2329;
  --surface-input: #2B3139; --surface-hover: #2B3139;
  --text-primary: #EAECEF; --text-secondary: #848E9C;
  --text-tertiary: #5E6673; --text-brand: #FCD535;
  --success: #0ECB81; --error: #F6465D;
  --border: #2B3139;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--surface-bg); color: var(--text-primary);
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.bg-orb {
  position: fixed; border-radius: 50%; filter: blur(120px);
  opacity: 0.04; pointer-events: none; z-index: 0;
}
.bg-orb-1 { width: 600px; height: 600px; top: -200px; right: -200px; background: var(--brand); }
.bg-orb-2 { width: 500px; height: 500px; bottom: -150px; left: -150px; background: var(--brand); }

.login-wrapper { position: relative; z-index: 1; width: 100%; max-width: 420px; padding: 24px; }

.login-card {
  background: var(--surface-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 40px 36px;
  position: relative;
}
.login-card::before {
  content: ''; position: absolute; inset: 0; border-radius: 12px; padding: 1px;
  background: linear-gradient(135deg, rgba(252,213,53,0.15), rgba(252,213,53,0.04));
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;
}
.login-card.shake { animation: shake 0.4s ease-in-out; }

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}

.login-header { text-align: center; margin-bottom: 32px; }
.login-logo {
  width: 52px; height: 52px; margin: 0 auto 16px;
  background: var(--brand); border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: 800; color: #0B0E11;
}
.login-header h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px; }
.login-header p { font-size: 14px; color: var(--text-tertiary); }

.login-error {
  background: rgba(246,70,93,0.08); border: 1px solid rgba(246,70,93,0.2);
  border-radius: 6px; padding: 10px 14px; font-size: 13px; color: var(--error);
  margin-bottom: 20px; display: none; line-height: 1.4;
}
.login-error.show { display: block; }

.form-field { margin-bottom: 20px; }
.form-field label {
  display: block; font-size: 11px; font-weight: 600;
  color: var(--text-tertiary); text-transform: uppercase;
  letter-spacing: 0.5px; margin-bottom: 6px;
}
.input {
  width: 100%; padding: 12px 14px;
  background: var(--surface-input); border: 1px solid var(--border);
  border-radius: 6px; font-size: 15px; color: var(--text-primary);
  transition: border-color 0.15s; outline: none;
}
.input:focus { border-color: var(--brand); box-shadow: 0 0 0 2px rgba(252,213,53,0.08); }
.input.error { border-color: var(--error); }

.pw-wrapper { position: relative; }
.pw-wrapper .input { padding-right: 44px; }

.pw-toggle {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  font-size: 18px; color: var(--text-tertiary); padding: 4px;
  transition: color 0.15s; line-height: 1;
}
.pw-toggle:hover { color: var(--text-primary); }

.form-error {
  font-size: 12px; color: var(--error); margin-top: 4px;
  display: none;
}
.form-error.show { display: block; }

.login-btn {
  width: 100%; padding: 13px;
  background: var(--brand); color: #0B0E11;
  border: none; border-radius: 6px;
  font-size: 15px; font-weight: 700; cursor: pointer;
  transition: all 0.15s; margin-top: 4px;
}
.login-btn:hover { background: var(--brand-hover); }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.login-footer { text-align: center; margin-top: 24px; }
.login-footer a {
  font-size: 13px; color: var(--text-tertiary); text-decoration: none;
  transition: color 0.15s;
}
.login-footer a:hover { color: var(--brand); }

@keyframes spin { to { transform: rotate(360deg); } }
.spinner {
  display: inline-block; width: 16px; height: 16px;
  border: 2px solid rgba(11,14,17,0.3); border-top-color: #0B0E11;
  border-radius: 50%; animation: spin 0.6s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
</style>
</head>
<body>
<div class="bg-orb bg-orb-1"></div>
<div class="bg-orb bg-orb-2"></div>

<div class="login-wrapper">
  <div class="login-card" id="login-card">
    <div class="login-header">
      <div class="login-logo">⚡</div>
      <h1>InfraX Admin</h1>
      <p>Sign in to manage the platform</p>
    </div>

    <div class="login-error" id="login-error"></div>

    <div class="form-field">
      <label for="username">Username</label>
      <input class="input" id="username" type="text" placeholder="Enter username" autocomplete="username" autofocus>
      <div class="form-error" id="user-error">Username is required</div>
    </div>

    <div class="form-field">
      <label for="password">Password</label>
      <div class="pw-wrapper">
        <input class="input" id="password" type="password" placeholder="Enter password" autocomplete="current-password">
        <button class="pw-toggle" id="pw-toggle" type="button" onclick="togglePassword()" aria-label="Toggle password visibility">👁</button>
      </div>
      <div class="form-error" id="pw-error">Password is required</div>
    </div>

    <button class="login-btn" id="login-btn" onclick="handleLogin()">Sign In</button>
  </div>

  <div class="login-footer">
    <a href="/">← Back to InfraX</a>
  </div>
</div>

<script>
var API_BASE = '';

function togglePassword() {
  var pw = document.getElementById('password');
  var btn = document.getElementById('pw-toggle');
  if (pw.type === 'password') {
    pw.type = 'text';
    btn.textContent = '🙈';
  } else {
    pw.type = 'password';
    btn.textContent = '👁';
  }
}

async function handleLogin() {
  var ue = document.getElementById('username');
  var pe = document.getElementById('password');
  var uer = document.getElementById('user-error');
  var per = document.getElementById('pw-error');
  var le = document.getElementById('login-error');
  var btn = document.getElementById('login-btn');
  var card = document.getElementById('login-card');

  uer.classList.remove('show');
  per.classList.remove('show');
  le.classList.remove('show');
  card.classList.remove('shake');

  var u = ue.value.trim();
  var p = pe.value;
  var valid = true;

  if (!u) {
    uer.classList.add('show');
    ue.classList.add('error');
    ue.focus();
    valid = false;
  } else {
    ue.classList.remove('error');
  }

  if (!p) {
    per.classList.add('show');
    pe.classList.add('error');
    if (valid) pe.focus();
    valid = false;
  } else {
    pe.classList.remove('error');
  }

  if (!valid) {
    card.classList.add('shake');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Signing in...';

  try {
    var resp = await fetch(API_BASE + '/api/v2/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    var json = await resp.json();

    if (json.code !== 0) {
      throw new Error(json.message || 'Invalid credentials');
    }

    localStorage.setItem('admin_token', json.data.token);
    localStorage.setItem('admin_expires', (Date.now() + 23 * 3600 * 1000).toString());
    window.location.href = '/admin.html';
  } catch (e) {
    le.textContent = 'Authentication failed: ' + (e.message || 'Please check your credentials.');
    le.classList.add('show');
    card.classList.add('shake');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>

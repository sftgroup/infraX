<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InfraX — Connect Wallet</title>
<style>
:root {
  --dark-950: #0B0E11; --dark-800: #0B0E11;
  --dark-700: #2B3139; --dark-400: #848E9C; --dark-300: #5E6673;
  --brand: #FCD535; --brand-hover: #F0B90B;
  --success: #0ECB81; --error: #F6465D;
  --surface-card: #1E2329; --border: #2B3139;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--dark-950); color: #EAECEF;
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
}
.card {
  background: var(--surface-card);
  border: 1px solid var(--border);
  border-radius: 6px; padding: 32px; width: 100%; max-width: 400px;
  text-align: center;
}
h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; line-height: 1.3; }
.sub { font-size: 13px; color: var(--dark-400); margin-bottom: 24px; line-height: 1.5; }
.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 24px; border-radius: 4px; font-size: 14px; font-weight: 600;
  cursor: pointer; border: none; transition: all 0.15s;
  width: 100%; justify-content: center; line-height: 1;
}
.btn-primary { background: var(--brand); color: #181A20; }
.btn-primary:hover { background: var(--brand-hover); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.error { color: var(--error); font-size: 12px; margin-top: 12px; }
.glow {
  position: absolute; width: 200px; height: 200px;
  border-radius: 50%; filter: blur(100px); opacity: 0.04; pointer-events: none;
}
.glow-left { background: var(--brand); left: -100px; top: -50px; }
.glow-right { background: var(--brand); right: -100px; bottom: -50px; }
.logo { font-size: 40px; margin-bottom: 12px; display: block; }
</style>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</head>
<body>
<div class="glow glow-left"></div>
<div class="glow glow-right"></div>

<div class="card">
  <span class="logo">🪙</span>
  <h1>InfraX</h1>
  <p class="sub">Connect your wallet to access all features</p>

  <div style="display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid var(--border);padding-bottom:8px">
    <button class="tab-btn active" style="flex:1;padding:8px;background:var(--dark-700);border:none;color:var(--brand);border-radius:4px;cursor:pointer;font-size:13px;font-weight:600" onclick="switchTab('metamask')">🦊 MetaMask</button>
    <button class="tab-btn" style="flex:1;padding:8px;background:transparent;border:1px solid var(--border);color:var(--dark-400);border-radius:4px;cursor:pointer;font-size:13px;font-weight:600" onclick="switchTab('privkey')">🔑 Private Key</button>
  </div>

  <div id="tab-metamask">
    <button class="btn btn-primary" id="connect-btn" onclick="connectMetaMask()">
      <span style="font-size:16px">🦊</span> Connect MetaMask
    </button>
    <p style="font-size:11px;color:var(--dark-400);margin-top:16px">
      No wallet? Get <a href="https://metamask.io" target="_blank" style="color:var(--brand)">MetaMask</a>
    </p>
  </div>

  <div id="tab-privkey" style="display:none">
    <input type="password" id="privkey-input" class="input" placeholder="Enter private key (0x...)" style="width:100%;margin-bottom:12px;padding:10px 12px;background:var(--dark-700);border:1px solid var(--border);border-radius:4px;color:#EAECEF;font-size:13px;font-family:monospace">
    <button class="btn btn-primary" id="privkey-btn" onclick="connectPrivateKey()">
      <span style="font-size:16px">🔑</span> Connect with Private Key
    </button>
  </div>

  <div class="error" id="error"></div>
</div>

<script>
var API = location.protocol + '//' + location.host;

function showError(msg) {
  document.getElementById('error').textContent = msg;
}

function switchTab(tab) {
  document.getElementById('error').textContent = '';
  var tabs = document.querySelectorAll('.tab-btn');
  if (tab === 'metamask') {
    tabs[0].style.background = 'var(--dark-700)'; tabs[0].style.border = 'none'; tabs[0].style.color = 'var(--brand)';
    tabs[1].style.background = 'transparent'; tabs[1].style.border = '1px solid var(--border)'; tabs[1].style.color = 'var(--dark-400)';
    document.getElementById('tab-metamask').style.display = 'block';
    document.getElementById('tab-privkey').style.display = 'none';
  } else {
    tabs[1].style.background = 'var(--dark-700)'; tabs[1].style.border = 'none'; tabs[1].style.color = 'var(--brand)';
    tabs[0].style.background = 'transparent'; tabs[0].style.border = '1px solid var(--border)'; tabs[0].style.color = 'var(--dark-400)';
    document.getElementById('tab-metamask').style.display = 'none';
    document.getElementById('tab-privkey').style.display = 'block';
    document.getElementById('privkey-input').focus();
  }
}

async function connectMetaMask() {
  document.getElementById('error').textContent = '';
  var btn = document.getElementById('connect-btn');
  btn.disabled = true;
  btn.textContent = 'Connecting...';

  try {
    if (typeof window.ethereum === 'undefined') {
      throw new Error('No wallet detected. Please install MetaMask or use a Web3 browser.');
    }

    var accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    var address = accounts[0].toLowerCase();

    var ts = Date.now().toString();
    var sig = await window.ethereum.request({
      method: 'personal_sign',
      params: ['InfraX auth: ' + ts, address]
    });

    var r = await fetch(API + '/api/v2/wallet/balance', {
      headers: {
        'x-wallet-address': address,
        'x-wallet-signature': sig,
        'x-wallet-timestamp': ts
      }
    });

    if (!r.ok && r.status !== 401) {
      var j = await r.json().catch(() => ({}));
      if (j.code && j.code > 0) throw new Error(j.message || 'Connection failed');
    }

    localStorage.setItem('px_sig', sig);
    localStorage.setItem('px_ts', ts);
    localStorage.setItem('px_sig_addr', address);
    localStorage.setItem('px_user', JSON.stringify({
      walletAddress: address,
      connectedAt: Date.now()
    }));

    window.location.href = '/index.html';

  } catch (e) {
    showError(e.message || 'Connection failed. Please try again.');
    btn.disabled = false;
    btn.innerHTML = '<span style="font-size:16px">🦊</span> Connect MetaMask';
  }
}

async function connectPrivateKey() {
  document.getElementById('error').textContent = '';
  var btn = document.getElementById('privkey-btn');
  var pk = document.getElementById('privkey-input').value.trim();
  if (!pk) return showError('Please enter a private key');
  if (!pk.startsWith('0x')) pk = '0x' + pk;
  if (pk.length !== 66) return showError('Invalid private key length');

  btn.disabled = true;
  btn.textContent = 'Connecting...';

  try {
    var wallet = new ethers.Wallet(pk);
    var address = wallet.address.toLowerCase();
    var ts = Date.now().toString();
    var sig = await wallet.signMessage('InfraX auth: ' + ts);

    var r = await fetch(API + '/api/v2/wallet/balance', {
      headers: {
        'x-wallet-address': address,
        'x-wallet-signature': sig,
        'x-wallet-timestamp': ts
      }
    });

    if (!r.ok && r.status !== 401) {
      var j = await r.json().catch(() => ({}));
      if (j.code && j.code > 0) throw new Error(j.message || 'Connection failed');
    }

    localStorage.setItem('px_sig', sig);
    localStorage.setItem('px_ts', ts);
    localStorage.setItem('px_sig_addr', address);
    localStorage.setItem('px_user', JSON.stringify({
      walletAddress: address,
      connectedAt: Date.now()
    }));

    window.location.href = '/index.html';

  } catch (e) {
    showError(e.message || 'Connection failed. Please try again.');
    btn.disabled = false;
    btn.textContent = '🔑 Connect with Private Key';
  }
}

(function() {
  try {
    var u = JSON.parse(localStorage.getItem('px_user') || '{}');
    if (u.walletAddress) {
      window.location.href = '/index.html';
    }
  } catch(e) {}
})();
</script>
</body>
</html>
